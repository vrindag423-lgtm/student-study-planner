<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Planner | Study Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<div class="aurora"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>
<div class="overlay-bg"></div>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">📘 StudyPlanner<span class="dot">.</span></div>
    <nav>
      <a href="dashboard.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Dashboard
      </a>
      <a href="tasks.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        My Tasks
      </a>
      <a href="planner.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Weekly Planner
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar user-initial">U</div>
        <div>
          <div class="user-name" style="font-weight:700;">Student</div>
          <div class="user-email" style="color:var(--text-muted); font-size:0.75rem;"></div>
        </div>
      </div>
      <a href="#" class="nav-link logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:14px;">
        <button class="btn-icon menu-toggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div>
          <h1>Weekly Planner</h1>
          <div class="greeting-sub">Plan your study schedule day by day.</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
        </button>
        <button class="btn btn-primary" id="add-task-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          <span class="fab-label">New Task</span>
        </button>
      </div>
    </div>

    <!-- WEEK NAVIGATION -->
    <div class="panel" style="margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="btn-icon" id="prev-week-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <strong id="week-range-label">This Week</strong>
        <button class="btn-icon" id="next-week-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <button class="btn btn-outline btn-sm" id="this-week-btn">Jump to This Week</button>
    </div>

    <div class="dashboard-columns" style="margin-bottom:24px;">
      <!-- DAILY SCHEDULE -->
      <div class="panel">
        <div class="panel-header">
          <h2>Today's Study Schedule</h2>
          <span id="today-date-label" style="font-size:0.8rem; color:var(--text-muted);"></span>
        </div>
        <div class="task-list" id="today-schedule-list">
          <div class="empty-state">Loading...</div>
        </div>
      </div>

      <!-- SUBJECT BREAKDOWN -->
      <div class="panel">
        <div class="panel-header">
          <h2>Tasks by Subject</h2>
        </div>
        <div class="chart-wrap" style="height:150px; margin-bottom:14px;">
          <canvas id="subjectChart"></canvas>
        </div>
        <div id="subject-breakdown-list">
          <div class="empty-state">Loading...</div>
        </div>
      </div>
    </div>

    <!-- WEEKLY GRID -->
    <div class="panel">
      <div class="panel-header">
        <h2>7-Day Overview</h2>
      </div>
      <div class="week-grid" id="week-grid">
        <!-- populated by planner.js -->
      </div>
    </div>
  </main>
</div>

<!-- ADD/EDIT TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">New Task</h3>
      <button class="btn-icon" id="close-modal">✕</button>
    </div>
    <form id="task-form">
      <input type="hidden" id="task-id" />
      <div class="form-group">
        <label>Task Title</label>
        <input type="text" id="task-title" required placeholder="e.g. Complete DBMS Assignment" />
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <textarea id="task-description" rows="2" placeholder="Add more details..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Subject / Category</label>
          <input type="text" id="task-subject" required placeholder="e.g. DBMS" />
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="task-priority">
            <option value="High">High</option>
            <option value="Medium" selected>Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="task-due-date" required />
        </div>
        <div class="form-group">
          <label>Due Time</label>
          <input type="time" id="task-due-time" value="23:59" />
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancel-modal">Cancel</button>
        <button type="submit" class="btn btn-primary" id="save-task-btn">Save Task</button>
      </div>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/tasks-common.js"></script>
<script src="js/planner.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="js/charts.js"></script>
</body>
</html>
